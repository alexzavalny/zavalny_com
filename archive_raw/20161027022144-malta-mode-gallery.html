		<a data-id="2647" href="https://farm6.staticflickr.com/5715/29580978924_194d4ac287_b.jpg">
			<img src="https://farm6.staticflickr.com/5715/29580978924_194d4ac287_n.jpg"  alt="Мы всегда мечтали побывать на Мальте. В начале этой осени мы решили осуществить эту мечту – и отправились на неделю в мальтийские приключения! <br>
<br>
Начали мы наше расследование со столицы Мальты – Валлетты."
			/>
		</a>
		<a data-id="2645" href="https://farm8.staticflickr.com/7499/29580980114_c882f65ae7_b.jpg">
			<img src="https://farm8.staticflickr.com/7499/29580980114_c882f65ae7_n.jpg"  alt="<em>Валлетта</em> очень-очень маленькая. Население - около 6 тысяч человек! Исторический центр Валлетты – это одна большая крепость. <br>
<br>
Интересный факт. Кликните на значок карты (верхняя правая иконка на фотографии). Видите, какие ровные улицы в Валлетте? Это не случайность. Улицы столицы были спроектированы таким образом, чтобы ветер с моря хорошенько продувал через весь город и освежал, работая как кондиционер."
			/>
		</a>
		<a data-id="2644" href="https://farm6.staticflickr.com/5107/29580977153_40be772974_b.jpg">
			<img src="https://farm6.staticflickr.com/5107/29580977153_40be772974_n.jpg"  alt="Сразу перекусим. Национальная блюдо на Мальте – пастицци, булочки с сыром или горохом из слоёного теста. Ели мы их постоянно. Цена одной штучки чаще всего 0.35 евро."
			/>
		</a>
		<a data-id="2646" href="https://farm6.staticflickr.com/5799/29580976413_f2489c88fe_b.jpg">
			<img src="https://farm6.staticflickr.com/5799/29580976413_f2489c88fe_n.jpg"  alt="Жарень стояла крутая, около 30 градусов точно. Тяжело, но после нашей латвийской серости – кайф."
			/>
		</a>
		<a data-id="2648" href="https://farm6.staticflickr.com/5516/29580975463_6480c15205_b.jpg">
			<img src="https://farm6.staticflickr.com/5516/29580975463_6480c15205_n.jpg"  alt="На протяжении веков Мальта переходила из рук в руки: когда-то принадлежала грекам, с VI века до нашей эры — Карфагену, потом — Риму, затем её захватили вандалы, которых сменили византийцы, а в 869 году — арабы. Норманны позже присоединили Мальту к Сицилии. Поэтому архитектура тут как коллаж – смесь арабского и итальянского стиля. Но балкончики тут – это нечто! Мы составили целую коллекцию фотографий!"
			/>
		</a>

			<img src="https://farm9.staticflickr.com/8279/30210190445_92efb9cc29_n.jpg"  alt="Мальтийское мороженое прекрасно. Очень вкусное, похоже на итальянское. Но не в Валлетте оно нас порадовало больше всего! Если окажетесь на Мальте, слопайте мороженое, про которое мы напишем чуть ниже!"
			/>
		</a>

			/>
		</a>
		<a data-id="2671" href="https://farm9.staticflickr.com/8269/29580967043_3883d0a964_b.jpg">
			<img src="https://farm9.staticflickr.com/8269/29580967043_3883d0a964_n.jpg"  alt="Почти в каждом заливе на Мальте - куча корабликов и яхт. Хоть они и украшают виды, я представляю всю ту грязь, что они сливают в воду и мне становится не по себе."
			/>
		</a>
		<a data-id="2670" href="https://farm6.staticflickr.com/5095/29914258710_2618ec7b59_b.jpg">

			/>

		<a data-id="2673" href="https://farm9.staticflickr.com/8414/29580966213_cc792dd71e_b.jpg">

			/>
		</a>
		<a data-id="2674" href="https://farm6.staticflickr.com/5737/30210187105_3ff859f6f6_b.jpg">
			<img src="https://farm6.staticflickr.com/5737/30210187105_3ff859f6f6_n.jpg"  alt="Ну а это самый главный прикол. Лучший пляж в Сейнт-Джулиансе. Серьезно, нам сказали, что это лучший пляж! Он ужасен. Если б у нас в Юрмале была летом тёплая вода, то этот пляж проигрывал бы нашему юрмальскому во всём! Места мало, вид никакой, плюс обсуждаемые выше лодки портят воду своими отходами."
			/>
		</a>
		<a data-id="2633" href="https://farm9.staticflickr.com/8559/30175683976_c9ea0c4c75_b.jpg">
			<img src="https://farm9.staticflickr.com/8559/30175683976_c9ea0c4c75_n.jpg"  alt="Про нашу гостиницу много говорить не будем. Она называется Paradise Bay Resort и мы не рекомендуем в ней оставаться. Вечером возле неё не погулять, еда так себе, в лобби некрасиво, аудитория - немецкие пенсионеры, интернет платный. "
			/>
		</a>
		<a data-id="2675" href="https://farm6.staticflickr.com/5292/30210186515_86e4ea52f8_b.jpg">
			<img src="https://farm6.staticflickr.com/5292/30210186515_86e4ea52f8_n.jpg"  alt="Пляж возле нашей гостиницы. Это – весь пляж, а не его часть. Увидев его, мы впали в маленькую депрессию. Надо было, наверное, проверить, что за пляж у гостиницы, которую мы заказывали. "
			/>
		</a>
		<a data-id="2676" href="https://farm9.staticflickr.com/8269/30175667566_e3203637f7_b.jpg">
			<img src="https://farm9.staticflickr.com/8269/30175667566_e3203637f7_n.jpg"  alt="В один из дней мы отправились на остров <em>Гозо</em>. Он находится прямо над Мальтой. Один блоггер написал, что побывав на Мальте и на острове Гозо, он понял, что в следующий раз будет жить на Гозо, потому что там круче всего. Мы отправились проверить это.<br>
<br>
Чтобы добраться до Гозо, нужно сначала оказаться на пароме, а он находится в самой заброшенной части Мальты, на самом севере. Благо, наша гостиница оказалась в том же забытом Богом местом, поэтому мы дошли до него пешком."
			/>
		</a>

			<img src="https://farm9.staticflickr.com/8748/29914255710_11af5e0a07_n.jpg"  alt="Всего за 4.5 евро можно доплыть до Гозо."
			/>
		</a>

			/>

			/>
		</a>
		<a data-id="2681" href="https://farm9.staticflickr.com/8703/29580963113_e845c425a3_b.jpg">

			/>
		</a>

			/>
		</a>
		<a data-id="2683" href="https://farm9.staticflickr.com/8559/29580962553_922e46e897_b.jpg">
			<img src="https://farm9.staticflickr.com/8559/29580962553_922e46e897_n.jpg"  alt="Сверху открывается... вид. Красивым его сильно не назовёшь, но на Мальте приходится довольствоваться этим. Здесь нет красивых лесов, деревьев или хотя бы кустов."
			/>

			<img src="https://farm9.staticflickr.com/8535/30210181175_594d271d8d_n.jpg"  alt="Это — самая высокая точка на Гозо."
			/>

			<img src="https://farm9.staticflickr.com/8420/30175693686_e2f74fd208_n.jpg"  alt="Это — наш любимый пляж на Мальте. Позже, почитав отзывы, я понял, что мы в этом не оригинальны. Почти во всех 'топах' пляжей, эти три — на первых местах. <br>
<br>
Пляж очень широкий, заходить в воду удобно. Вид безумно красивый, купаешься между скалами. Солнце ослепляло нас своим светом, а вода – своим голубым отражением. Мои глаза стали еще более китайскими."
			/>

			/>
		</a>
		<a data-id="2618" href="https://farm9.staticflickr.com/8273/29580997574_3e05efc1f5_b.jpg">

			/>
		</a>

			<img src="https://farm6.staticflickr.com/5181/29580995683_fcc37577fd_n.jpg"  alt="Gallery stop"
			/>
		</a>
		<a data-id="2620" href="https://farm9.staticflickr.com/8734/29914276580_93b2213e46_b.jpg">
			<img src="https://farm9.staticflickr.com/8734/29914276580_93b2213e46_n.jpg"  alt="В общем, если вы окажетесь на Мальте, либо берите отель возле Golden Bay, либо поезжайте туда на автобусе. <br>
<br>
Ах да, обещанный рассказ про лучшее мороженое, что нам удалось найти. Дело было вечером в городе <em>Буггиба</em>. Этот город – самое близкое тусовочное место к нашему отшибу. В центре города – классная площадь, где отдыхают туристы и местные жители."
			/>
		</a>
		<a data-id="2621" href="https://farm9.staticflickr.com/8653/30175688726_88b2028e7a_b.jpg">
			<img src="https://farm9.staticflickr.com/8653/30175688726_88b2028e7a_n.jpg"  alt="Так вот, кафешка называется Gelatiamo. И эта девушка на кассе – самый добрый продавец на Мальте. Когда мы заказали два шарика, мы и не представляли, какого размера они окажутся."
			/>
		</a>
		<a data-id="2622" href="https://farm6.staticflickr.com/5695/29914275570_3252833167_b.jpg">
			<img src="https://farm6.staticflickr.com/5695/29914275570_3252833167_n.jpg"  alt="Даже фото не может передать всю щедрость работницы этого заведения!"
			/>
		</a>

			<img src="https://farm6.staticflickr.com/5790/29914271950_7ba730f056_n.jpg"  alt="В последний день нашей поездки мы отправились в город <em>Слима</em>. И нам стало очень обидно, так как в этом городе – самая классная набережная на Мальте. Променадная вдоль набережной просто бесконечна, и есть большой парк возле неё."
			/>
		</a>
		<a data-id="2635" href="https://farm6.staticflickr.com/5794/30175682946_2273e4bd29_b.jpg">
			<img src="https://farm6.staticflickr.com/5794/30175682946_2273e4bd29_n.jpg"  alt="Это – штуковина для упражнения на руки. Крутишь её то по часовой стрелке, то против, и руки очень напрягаются."
			/>
		</a>

			<img src="https://farm9.staticflickr.com/8534/29914271040_4d37dde673_n.jpg"  alt="Почти на каждой стене дома – маленькая религиозная символика."
			/>
		</a>
		<a data-id="2637" href="https://farm6.staticflickr.com/5468/30175681896_520da8f8f7_b.jpg">

			/>
		</a>
		<a data-id="2639" href="https://farm6.staticflickr.com/5206/29914269760_ed617f30eb_b.jpg">
			<img src="https://farm6.staticflickr.com/5206/29914269760_ed617f30eb_n.jpg"  alt="Чай является лучшим напитком в мире, да что уж там, лучше чая нет ничего на свете. И тот кто смастерил этот памятник, знает это."
			/>
		</a>
		<a data-id="2640" href="https://farm6.staticflickr.com/5262/29580983394_06467cedcc_b.jpg">
			<img src="https://farm6.staticflickr.com/5262/29580983394_06467cedcc_n.jpg"  alt="Всю поездку нам немножко не хватало магазинов, и вот, в последний день, в Слиме, мы нашли их. К сожалению, своё открытие мы сделали в воскресенье, когда не работает ничего."
			/>
		</a>
		<a data-id="2642" href="https://farm6.staticflickr.com/5504/30175680136_a745ca7c17_b.jpg">
			<img src="https://farm6.staticflickr.com/5504/30175680136_a745ca7c17_n.jpg"  alt="Последний день и так был несолнечным, а потом и вовсе пошёл настоящий ливень. Ксюша смотрела на капельки дождя, стекающие по окну, пила свой кофе и думала о том, что скоро на работу."
			/>

		<a data-id="2638" href="https://farm6.staticflickr.com/5517/30095732462_d6922699cd_b.jpg">
			<img src="https://farm6.staticflickr.com/5517/30095732462_d6922699cd_n.jpg"  alt="Что сказать про Мальту напоследок? Любое путешествие прекрасно, так как это – познание мира. И поэтому, поездка на Мальту была прекрасной и мы благодарны ей за одно только Азурное Окно, у которого можно сидеть вечно.<br>
<br>
Однако, объективно сравнивая Мальту, например, с Критом, мы рекомендуем сначала ехать на Крит. Как-то та атмосфера и природа нам понравилась больше. При этом, как бы противоречиво это не звучало, если вы занимаетесь фотоохотой на закаты, то тут выбор уже может пасть на Мальту.
